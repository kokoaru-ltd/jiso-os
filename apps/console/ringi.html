<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JISO — 稟議</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--ink:#16151a;--paper:#faf9f6;--line:#e8e6e1;--gray:#6c6b73;--shu:#e0341f;--ok:#1e9e5a;--mono:'IBM Plex Mono',monospace}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--paper);color:var(--ink);font-family:'Noto Sans JP',sans-serif;font-size:15px;line-height:1.8;padding-bottom:60px}
.wrap{max-width:560px;margin:0 auto;padding:0 16px}
header{position:sticky;top:0;background:rgba(250,249,246,.92);backdrop-filter:blur(10px);border-bottom:1px solid var(--line);z-index:10}
.h-in{display:flex;align-items:center;gap:10px;height:58px}
.h-in svg{flex-shrink:0}
.h-in b{font-size:16px}
.h-in .stat{margin-left:auto;font-family:var(--mono);font-size:11px;color:var(--gray)}
h2{font-size:13px;font-weight:900;letter-spacing:.08em;color:var(--gray);margin:26px 0 12px}
.card{background:#fff;border:1px solid var(--line);border-radius:14px;padding:18px;margin-bottom:12px;position:relative}
.card .rt{display:flex;justify-content:space-between;font-family:var(--mono);font-size:10.5px;color:var(--gray)}
.card h3{font-size:15px;font-weight:700;margin:8px 0 2px}
.card .by{font-size:11px;color:var(--gray);margin-bottom:10px}
.card dl{display:grid;grid-template-columns:auto 1fr;gap:6px 16px;font-size:12.5px}
.card dt{color:var(--gray)}
.card dd{font-family:var(--mono)}
.card dd.shu{color:var(--shu);font-weight:700}
.card .purpose{font-size:12px;color:var(--gray);background:var(--paper);border-radius:8px;padding:10px 12px;margin:10px 0}
.btns{display:flex;gap:10px;margin-top:12px}
.btns button{flex:1;padding:13px;border-radius:10px;border:none;font-weight:700;font-size:14px;cursor:pointer;font-family:inherit}
.ap{background:var(--ink);color:#fff}
.ap:active{background:var(--shu)}
.rj{background:#fff;border:1.5px solid var(--line) !important;color:var(--gray)}
.empty{color:var(--gray);font-size:13px;text-align:center;padding:24px;border:1px dashed var(--line);border-radius:12px}
.feed{font-size:12px}
.feed .row{display:flex;gap:10px;padding:9px 0;border-bottom:1px dashed var(--line)}
.feed .t{font-family:var(--mono);font-size:10px;color:#b3b1a9;flex-shrink:0;width:74px}
.feed .a{color:var(--gray)}
.pill{display:inline-block;font-family:var(--mono);font-size:10px;padding:2px 8px;border-radius:999px;border:1px solid var(--line);color:var(--gray);margin-left:6px}
.pill.executing{color:var(--ok);border-color:var(--ok)}
.pill.rejected{color:var(--gray)}
.pill.approved{color:var(--shu);border-color:var(--shu)}
#login{max-width:380px;margin:80px auto;padding:0 20px;text-align:center}
#login input{width:100%;padding:14px 16px;border:1.5px solid var(--line);border-radius:10px;font-size:14px;font-family:var(--mono);margin:18px 0 12px}
#login button{width:100%;padding:14px;border-radius:10px;border:none;background:var(--ink);color:#fff;font-weight:700;font-size:14px;cursor:pointer}
#login .err{color:var(--shu);font-size:12px;min-height:18px;margin-top:8px}
.toast{position:fixed;left:50%;bottom:24px;transform:translateX(-50%);background:var(--ink);color:#fff;font-size:13px;padding:11px 22px;border-radius:999px;opacity:0;transition:opacity .3s;pointer-events:none}
.toast.show{opacity:1}
</style>
</head>
<body>

<div id="login">
  <svg width="56" height="56" viewBox="0 0 48 48" style="margin:0 auto;display:block"><rect x="2" y="2" width="44" height="44" rx="7" fill="#e0341f"/><text x="24" y="20.5" text-anchor="middle" font-family="serif" font-weight="700" font-size="16" fill="#fff">自</text><text x="24" y="38.5" text-anchor="middle" font-family="serif" font-weight="700" font-size="16" fill="#fff">走</text></svg>
  <p style="margin-top:14px;font-weight:900">JISO 稟議コンソール</p>
  <input id="secret" type="password" placeholder="admin secret" autocomplete="off">
  <button onclick="login()">入る</button>
  <div class="err" id="err"></div>
</div>

<div id="app" style="display:none">
  <header><div class="wrap h-in">
    <svg width="30" height="30" viewBox="0 0 48 48"><rect x="2" y="2" width="44" height="44" rx="7" fill="#e0341f"/><text x="24" y="20.5" text-anchor="middle" font-family="serif" font-weight="700" font-size="16" fill="#fff">自</text><text x="24" y="38.5" text-anchor="middle" font-family="serif" font-weight="700" font-size="16" fill="#fff">走</text></svg>
    <b>稟議</b>
    <span class="stat" id="stat"></span>
  </div></header>
  <div class="wrap">
    <h2>承認待ち</h2>
    <div id="pending"></div>
    <h2>最近の決裁</h2>
    <div id="recent" class="feed"></div>
    <h2>自走ログ</h2>
    <div id="audit" class="feed"></div>
  </div>
</div>
<div class="toast" id="toast"></div>

<script>
const API='https://wckfqfjzpmjkznhnfaqb.supabase.co/functions/v1/ringi';
let SECRET='';
const $=id=>document.getElementById(id);
const yen=n=>'¥'+Number(n||0).toLocaleString('ja-JP');
const dt=s=>new Date(s).toLocaleString('ja-JP',{month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit'});
function toast(m){const t=$('toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2200)}

async function api(method,body){
  const r=await fetch(API,{method,headers:{'Content-Type':'application/json','x-jiso-secret':SECRET},body:body?JSON.stringify(body):undefined});
  return {status:r.status,data:await r.json().catch(()=>({}))};
}
async function login(){
  SECRET=$('secret').value.trim();
  const {status}=await api('GET');
  if(status===401){$('err').textContent='シークレットが違います';return}
  if(status!==200){$('err').textContent='接続エラー ('+status+')';return}
  $('login').style.display='none';$('app').style.display='block';
  load();
}
async function load(){
  const {status,data}=await api('GET');
  if(status!==200)return toast('読込エラー');
  $('stat').textContent='β登録 '+data.signups+'件';
  $('pending').innerHTML=(data.pending&&data.pending.length)?data.pending.map(r=>`
    <div class="card">
      <div class="rt"><span>RINGI #${r.id}</span><span>${dt(r.created_at)}</span></div>
      <h3>${esc(r.title)}</h3>
      <div class="by">起票：${esc(r.filed_by)}</div>
      <dl>
        <dt>申請金額</dt><dd>${yen(r.amount_yen)}</dd>
        <dt>想定ROI</dt><dd class="shu">${r.expected_roi_pct??'—'}%</dd>
        <dt>撤退条件</dt><dd style="font-family:inherit">${esc(r.exit_condition)}</dd>
      </dl>
      <div class="purpose">${esc(r.purpose)}${r.poc_design?'<br>POC：'+esc(r.poc_design):''}</div>
      <div class="btns">
        <button class="rj" onclick="decide(${r.id},'rejected')">却下</button>
        <button class="ap" onclick="decide(${r.id},'approved')">承認する</button>
      </div>
    </div>`).join(''):'<div class="empty">承認待ちの稟議はありません。OSは自走中です。</div>';
  $('recent').innerHTML=(data.recent||[]).map(r=>`<div class="row"><span class="t">#${r.id}</span><span class="a">${esc(r.title)} ${yen(r.amount_yen)}<span class="pill ${r.status}">${r.status}</span></span></div>`).join('')||'<div class="empty">まだありません</div>';
  $('audit').innerHTML=(data.audit||[]).map(a=>`<div class="row"><span class="t">${dt(a.created_at)}</span><span class="a"><b>${esc(a.agent)}</b> ${esc(a.action)}</span></div>`).join('');
}
async function decide(id,decision){
  if(decision==='approved'&&!confirm('稟議 #'+id+' を承認します。よろしいですか？'))return;
  const {status,data}=await api('POST',{id,decision,decided_by:'kondo'});
  toast(status===200?('#'+id+(decision==='approved'?' 承認しました':' 却下しました')):'失敗: '+(data.error||status));
  load();
}
function esc(s){return String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]))}
$('secret').addEventListener('keydown',e=>{if(e.key==='Enter')login()});
setInterval(()=>{if($('app').style.display!=='none')load()},30000);
</script>
</body>
</html>
